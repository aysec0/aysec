<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0d12" />
  <title>Post — aysec</title>
  <link rel="icon" href="/img/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" />
  <link rel="stylesheet" href="/css/styles.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css" />
  <script src="/js/theme.js"></script>
</head>
<body>
  <div id="navbar-mount"></div>

  <header class="page-header">
    <div class="container">
      <div class="crumbs">
        <a href="/">~</a><span class="sep">/</span>
        <a href="/blog">blog</a><span class="sep">/</span>
        <span id="crumbSlug">…</span>
      </div>
      <div id="postHead">
        <div class="skeleton" style="height:34px;width:70%"></div>
      </div>
    </div>
  </header>

  <section class="section">
    <div class="container">
      <div class="post-shell">
        <article style="max-width:780px; min-width:0;">
          <div class="prose" id="postBody">
            <div class="skeleton" style="height:14px;width:100%;margin-bottom:0.5rem"></div>
            <div class="skeleton" style="height:14px;width:90%;margin-bottom:0.5rem"></div>
            <div class="skeleton" style="height:14px;width:80%"></div>
          </div>

          <div class="divider"></div>

          <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:1rem;">
            <a href="/blog" class="btn btn-ghost">← Back to blog</a>
            <div id="shareRow"></div>
          </div>

          <div id="relatedSection" style="margin-top:3rem;" hidden>
            <span class="section-eyebrow">// read next</span>
            <h3 style="font-size:1.3rem; font-weight:700; letter-spacing:-0.01em; margin: 0.4rem 0 1.25rem;">Related posts</h3>
            <div class="grid grid-cols-3" id="relatedGrid"></div>
          </div>
        </article>

        <aside class="toc" id="toc" hidden>
          <div class="toc-title">// on this page</div>
          <ul id="tocList"></ul>
        </aside>
      </div>
    </div>
  </section>

  <div id="footer-mount"></div>

  <script src="/js/api.js"></script>
  <script src="/js/layout.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-core.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
  <script src="/js/post-detail.js"></script>
</body>
</html>
