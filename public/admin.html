<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0d12" />
  <title>Admin — aysec</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" href="/img/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="/css/styles.css" />
  <script src="/js/theme.js"></script>
</head>
<body>
  <div id="navbar-mount"></div>

  <header class="page-header">
    <div class="container">
      <div class="crumbs"><a href="/">~</a><span class="sep">/</span><span>admin</span></div>
      <span class="page-eyebrow">// /admin</span>
      <h1 class="page-title">Admin.</h1>
      <p class="page-subtitle">Read-write access to every entity. Don’t share this URL with non-admin accounts.</p>
    </div>
  </header>

  <section class="section">
    <div class="container admin-shell">
      <aside class="admin-side">
        <div class="admin-side-group">
          <div class="admin-side-title">Site</div>
          <button class="admin-tab is-active" data-tab="overview">Overview</button>
          <a class="admin-tab" href="/site-editor" target="_self" style="text-decoration:none; display:block;">✎ Visual editor</a>
          <button class="admin-tab" data-tab="site">Site settings</button>
          <button class="admin-tab" data-tab="users">Users</button>
        </div>
        <div class="admin-side-group">
          <div class="admin-side-title">Learn</div>
          <button class="admin-tab" data-tab="courses">Courses</button>
          <button class="admin-tab" data-tab="tracks">Paths</button>
          <button class="admin-tab" data-tab="cert-prep">Cert prep</button>
          <button class="admin-tab" data-tab="cheatsheets">Cheatsheets</button>
        </div>
        <div class="admin-side-group">
          <div class="admin-side-title">Compete</div>
          <button class="admin-tab" data-tab="challenges">Challenges</button>
          <button class="admin-tab" data-tab="daily">Daily</button>
          <button class="admin-tab" data-tab="ctf-events">CTF events</button>
          <button class="admin-tab" data-tab="assessments">Assessments</button>
          <button class="admin-tab" data-tab="pro-labs">Pro Labs</button>
        </div>
        <div class="admin-side-group">
          <div class="admin-side-title">Content</div>
          <button class="admin-tab" data-tab="posts">Posts</button>
          <button class="admin-tab" data-tab="calendar">Calendar events</button>
          <button class="admin-tab" data-tab="talks">Talks</button>
          <button class="admin-tab" data-tab="testimonials">Testimonials</button>
          <button class="admin-tab" data-tab="faqs">FAQs</button>
          <button class="admin-tab" data-tab="forum">Forum</button>
        </div>
      </aside>
      <main class="admin-main" id="adminMain">
        <div class="card" style="padding:1.5rem;"><div class="skeleton" style="height:18px;width:60%"></div></div>
      </main>
    </div>
  </section>

  <div id="footer-mount"></div>
  <script src="/js/api.js"></script>
  <script src="/js/layout.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@14.1.2/marked.min.js"></script>
  <script src="/js/admin.js"></script>
</body>
</html>
