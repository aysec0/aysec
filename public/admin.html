<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0d12" />
  <title>Admin — aysec</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" href="/img/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="/css/styles.css" />
  <script src="/js/theme.js"></script>
</head>
<body>
  <div id="navbar-mount"></div>

  <header class="page-header">
    <div class="container">
      <div class="crumbs"><a href="/">~</a><span class="sep">/</span><span>admin</span></div>
      <span class="page-eyebrow">// /admin</span>
      <h1 class="page-title">Admin.</h1>
      <p class="page-subtitle">Read-write access to every entity. Don’t share this URL with non-admin accounts.</p>
    </div>
  </header>

  <section class="section">
    <div class="container admin-shell">
      <aside class="admin-side">
        <div class="admin-side-group">
          <div class="admin-side-title">Site</div>
          <button class="admin-tab is-active" data-tab="overview"><span class="ti-ico">▦</span><span>Overview</span></button>
          <a class="admin-tab" href="/site-editor"><span class="ti-ico">✎</span><span>Visual editor</span></a>
          <button class="admin-tab" data-tab="site"><span class="ti-ico">⚙</span><span>Site settings</span></button>
          <button class="admin-tab" data-tab="users"><span class="ti-ico">👥</span><span>Users</span></button>
        </div>
        <div class="admin-side-group">
          <div class="admin-side-title">Learn</div>
          <button class="admin-tab" data-tab="courses"><span class="ti-ico">📚</span><span>Courses</span></button>
          <button class="admin-tab" data-tab="tracks"><span class="ti-ico">🛣</span><span>Paths</span></button>
          <button class="admin-tab" data-tab="cert-prep"><span class="ti-ico">🎓</span><span>Cert prep</span></button>
          <button class="admin-tab" data-tab="cheatsheets"><span class="ti-ico">📋</span><span>Cheatsheets</span></button>
        </div>
        <div class="admin-side-group">
          <div class="admin-side-title">Compete</div>
          <button class="admin-tab" data-tab="challenges"><span class="ti-ico">🚩</span><span>Challenges</span></button>
          <button class="admin-tab" data-tab="daily"><span class="ti-ico">🔥</span><span>Daily</span></button>
          <button class="admin-tab" data-tab="ctf-events"><span class="ti-ico">⚡</span><span>CTF events</span></button>
          <button class="admin-tab" data-tab="assessments"><span class="ti-ico">🛡</span><span>Assessments</span></button>
          <button class="admin-tab" data-tab="pro-labs"><span class="ti-ico">🖥</span><span>Pro Labs</span></button>
        </div>
        <div class="admin-side-group">
          <div class="admin-side-title">Content</div>
          <button class="admin-tab" data-tab="posts"><span class="ti-ico">✏</span><span>Posts</span></button>
          <button class="admin-tab" data-tab="calendar"><span class="ti-ico">📅</span><span>Calendar events</span></button>
          <button class="admin-tab" data-tab="talks"><span class="ti-ico">🎤</span><span>Talks</span></button>
          <button class="admin-tab" data-tab="testimonials"><span class="ti-ico">⭐</span><span>Testimonials</span></button>
          <button class="admin-tab" data-tab="faqs"><span class="ti-ico">❓</span><span>FAQs</span></button>
          <button class="admin-tab" data-tab="forum"><span class="ti-ico">💬</span><span>Forum</span></button>
        </div>
      </aside>
      <main class="admin-main" id="adminMain">
        <div class="card" style="padding:1.5rem;"><div class="skeleton" style="height:18px;width:60%"></div></div>
      </main>
    </div>
  </section>

  <!-- Modal overlay used by every admin "edit" / "+ new" form. Filled by admin.js. -->
  <div id="adminModal" class="admin-modal" hidden>
    <div class="admin-modal-backdrop" data-close-modal></div>
    <div class="admin-modal-shell"><div id="adminModalBody"></div></div>
  </div>

  <div id="footer-mount"></div>
  <script src="/js/api.js"></script>
  <script src="/js/layout.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@14.1.2/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/easymde/dist/easymde.min.css" />
  <script src="https://unpkg.com/easymde/dist/easymde.min.js"></script>
  <script src="/js/admin.js"></script>
</body>
</html>
