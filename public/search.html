<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0d12" />
  <title>Search — aysec</title>
  <link rel="icon" href="/img/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" />
  <link rel="stylesheet" href="/css/styles.css" />
  <script src="/js/theme.js"></script>
</head>
<body>
  <div id="navbar-mount"></div>

  <header class="page-header">
    <div class="container">
      <div class="crumbs"><a href="/">~</a><span class="sep">/</span><span>search</span></div>
      <span class="page-eyebrow">// /search</span>
      <h1 class="page-title">Search.</h1>
      <p class="page-subtitle">Across courses, lessons, blog posts, CTF challenges, cheatsheets, and certs.</p>
    </div>
  </header>

  <section class="section">
    <div class="container" style="max-width: 880px;">
      <form class="search-form" id="searchForm">
        <svg class="search-form-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input class="input search-form-input" id="searchInput" type="search" placeholder="What are you looking for?" autocomplete="off" autofocus />
        <button class="btn btn-primary" type="submit">Search</button>
      </form>

      <div class="search-filters" id="searchFilters" hidden>
        <button class="chip is-active" data-type="">All</button>
        <button class="chip" data-type="course">Courses</button>
        <button class="chip" data-type="lesson">Lessons</button>
        <button class="chip" data-type="post">Posts</button>
        <button class="chip" data-type="challenge">CTFs</button>
        <button class="chip" data-type="cheatsheet">Cheatsheets</button>
        <button class="chip" data-type="cert">Certs</button>
      </div>

      <div class="search-results" id="searchResults">
        <div class="empty"><p class="dim">Type a query to begin. <span class="mono">Tab</span> through the filters to scope by entity type.</p></div>
      </div>
    </div>
  </section>

  <div id="footer-mount"></div>

  <script src="/js/api.js"></script>
  <script src="/js/layout.js"></script>
  <script src="/js/search-page.js"></script>
</body>
</html>
