<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0d12" />
  <title>Live CTF events — aysec</title>
  <meta name="description" content="Scheduled, time-bounded CTF events with their own challenge sets and live scoreboard." />
  <link rel="icon" href="/img/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="/css/styles.css" />
  <script src="/js/theme.js"></script>
</head>
<body>
  <div id="navbar-mount"></div>

  <header class="page-header">
    <div class="container">
      <div class="crumbs"><a href="/">~</a><span class="sep">/</span><span>live</span></div>
      <span class="page-eyebrow">// /live</span>
      <h1 class="page-title">Live CTF events.</h1>
      <p class="page-subtitle">
        Scheduled, time-bounded competitions with their own challenge set and a per-event scoreboard.
        Watch this page on event days.
      </p>
    </div>
  </header>

  <section class="section">
    <div class="container">
      <div id="liveTabs" class="chips" style="margin-bottom:1.25rem;">
        <button class="chip active" data-tab="live">Live now</button>
        <button class="chip" data-tab="upcoming">Upcoming</button>
        <button class="chip" data-tab="ended">Ended</button>
      </div>
      <div id="liveGrid" class="grid grid-cols-2" data-reveal>
        <div class="card"><div class="skeleton" style="height:18px;width:50%"></div><div class="skeleton" style="height:14px;width:90%"></div></div>
        <div class="card"><div class="skeleton" style="height:18px;width:50%"></div><div class="skeleton" style="height:14px;width:90%"></div></div>
      </div>
      <div id="liveEmpty" hidden class="empty"><h3>Nothing here yet</h3><p>Check the other tabs.</p></div>
    </div>
  </section>

  <div id="footer-mount"></div>

  <script src="/js/api.js"></script>
  <script src="/js/layout.js"></script>
  <script src="/js/live-list.js"></script>
</body>
</html>
