<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0d12"/>
      <stop offset="1" stop-color="#0f1420"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a2030" stroke-width="0.6"/>
    </pattern>
    <radialGradient id="glow" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#39ff7a" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#39ff7a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Brand -->
  <g transform="translate(80 110)">
    <text x="0" y="0" font-family="JetBrains Mono, monospace" font-weight="700" font-size="44" fill="#39ff7a">~$</text>
    <text x="68" y="0" font-family="JetBrains Mono, monospace" font-weight="700" font-size="44" fill="#fff">aysec</text>
    <rect x="240" y="-32" width="14" height="38" fill="#39ff7a"/>
  </g>

  <!-- Hero text -->
  <text x="80" y="280" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="92" fill="#fff" letter-spacing="-2">Hack to learn.</text>
  <text x="80" y="380" font-family="JetBrains Mono, monospace" font-weight="800" font-size="92" fill="#39ff7a" letter-spacing="-1">Don't learn to hack.</text>

  <!-- Subtitle -->
  <text x="80" y="450" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="28" fill="#9ba8bc">
    Hands-on cybersecurity training · CTF · writeups · OSCP+ syllabus
  </text>

  <!-- Footer chips -->
  <g transform="translate(80 510)" font-family="JetBrains Mono, monospace" font-size="20" font-weight="600">
    <g>
      <rect x="0" y="0" width="124" height="44" rx="8" fill="#0a0d12" stroke="#5b9cff" stroke-width="1.5"/>
      <text x="62" y="29" text-anchor="middle" fill="#5b9cff">/courses</text>
    </g>
    <g transform="translate(140 0)">
      <rect x="0" y="0" width="116" height="44" rx="8" fill="#0a0d12" stroke="#39ff7a" stroke-width="1.5"/>
      <text x="58" y="29" text-anchor="middle" fill="#39ff7a">/challenges</text>
    </g>
    <g transform="translate(272 0)">
      <rect x="0" y="0" width="124" height="44" rx="8" fill="#0a0d12" stroke="#bb88ff" stroke-width="1.5"/>
      <text x="62" y="29" text-anchor="middle" fill="#bb88ff">/vault</text>
    </g>
    <g transform="translate(412 0)">
      <rect x="0" y="0" width="172" height="44" rx="8" fill="#0a0d12" stroke="#ffb74d" stroke-width="1.5"/>
      <text x="86" y="29" text-anchor="middle" fill="#ffb74d">/certifications</text>
    </g>
  </g>

  <!-- Hooded figure on the right (echoes the FAB avatar) -->
  <g transform="translate(990 200) scale(6)">
    <path d="M22 2 C16 2 11 6 11 14 v3 c-2 1-3 3-3 5 v3 c0 1 0.7 1.5 1.5 1.5 H38.5 c0.8 0 1.5-0.5 1.5-1.5 v-3 c0-2-1-4-3-5 v-3 C37 6 32 2 22 2 z" fill="#1a2030" stroke="#5b9cff" stroke-width="0.4"/>
    <path d="M14 17 c0-4 4-7 10-7 s10 3 10 7 c0 3-2 5-4 6 l-2.5 1.5 h-7 l-2.5-1.5 c-2-1-4-3-4-6 z" fill="#0a0d12"/>
    <circle cx="20" cy="19" r="1.4" fill="#39ff7a"/>
    <circle cx="28" cy="19" r="1.4" fill="#39ff7a"/>
  </g>
</svg>
