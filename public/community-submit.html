<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0d12" />
  <title>New post — community — aysec</title>
  <link rel="icon" href="/img/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="/css/styles.css" />
  <script src="/js/theme.js"></script>
</head>
<body>
  <div id="navbar-mount"></div>
  <header class="page-header">
    <div class="container">
      <div class="crumbs"><a href="/">~</a><span class="sep">/</span><a href="/community">community</a><span class="sep">/</span><span>new</span></div>
      <span class="page-eyebrow">// /community/submit</span>
      <h1 class="page-title">New post</h1>
    </div>
  </header>
  <section class="section">
    <div class="container" style="max-width:780px;">
      <form id="newPostForm" class="card" style="padding:1.5rem; display:grid; gap:0.7rem;">
        <label>category
          <select class="input" name="category" id="newPostCat" required></select>
        </label>
        <label>title (required)
          <input class="input" name="title" maxlength="280" required />
        </label>
        <label>link (optional)
          <input class="input mono" name="url" placeholder="https://…" />
        </label>
        <label>body (markdown, optional)
          <div class="forum-textarea-toolbar">
            <button type="button" class="forum-attach-btn" id="newPostAttach" title="Attach an image">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 17.93 8.8l-8.58 8.57a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
              Attach image
            </button>
            <span class="dim" style="font-size:0.78rem;">or drop / paste an image into the textarea</span>
          </div>
          <textarea class="textarea" name="body_md" id="newPostBody" rows="10" placeholder="What did you find / learn / question?"></textarea>
        </label>
        <details>
          <summary class="dim" style="font-size:0.85rem; cursor:pointer;">live preview</summary>
          <div id="newPostPreview" class="forum-md prose forum-md-preview-pane"></div>
        </details>

        <!-- Verified writeup + live window — the two new features -->
        <div class="forum-options">
          <label class="forum-option">
            <input type="checkbox" id="newPostGoLive" />
            <div>
              <span class="forum-option-name">
                <span class="forum-option-icon" data-icon="circle-dot" data-icon-size="14"></span>
                Go live for 60 minutes
              </span>
              <span class="forum-option-desc">Post pins to the top of the feed and replies stream in real-time. Switches to a normal thread after.</span>
            </div>
          </label>
          <label class="forum-option">
            <span style="display:flex; align-items:center; gap:0.5rem; flex-wrap:wrap; width:100%;">
              <span class="forum-option-name">
                <span class="forum-option-icon" data-icon="check-circle" data-icon-size="14"></span>
                Verify as writeup of:
              </span>
              <select class="input mono" id="newPostClaimChallenge" style="flex:1; min-width:240px;">
                <option value="">— Don't claim a challenge —</option>
              </select>
            </span>
            <span class="forum-option-desc">
              Only challenges you've solved show up. Verified writeups get a green check badge and surface higher in the feed.
            </span>
          </label>
        </div>

        <div style="display:flex; gap:0.5rem; align-items:center;">
          <button class="btn btn-primary" type="submit">Post</button>
          <a class="btn btn-ghost" href="/community">Cancel</a>
          <span id="newPostMsg" class="dim" style="font-size:0.85rem;"></span>
        </div>
      </form>
    </div>
  </section>
  <div id="footer-mount"></div>
  <script src="/js/api.js"></script>
  <script src="/js/layout.js"></script>
  <script src="/js/icons.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@14.1.2/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
  <script src="/js/forum-upload.js"></script>
  <script>
    (() => {
      const $ = (id) => document.getElementById(id);
      // Hydrate any inline data-icon placeholders (live + verified labels)
      function hydrateIcons() {
        if (!window.icon) return;
        document.querySelectorAll('[data-icon]:not([data-icon-rendered])').forEach((el) => {
          el.innerHTML = window.icon(el.dataset.icon, +(el.dataset.iconSize) || 14);
          el.dataset.iconRendered = '1';
        });
      }
      hydrateIcons();
      (async () => {
        const me = await window.api.get('/api/auth/me').catch(() => null);
        if (!me?.user) { location.href = '/login?next=/community/submit'; return; }
        const r = await window.api.get('/api/forum/categories');
        $('newPostCat').innerHTML = r.categories.map((c) => `<option value="${c.slug}">${c.name}</option>`).join('');

        // Populate the writeup-claim dropdown with challenges this user has
        // already solved. Anything they haven't solved is hidden — the
        // verified-writeup gate is enforced server-side too.
        try {
          const ch = await window.api.get('/api/challenges');
          const solved = (ch.challenges || []).filter((c) => c.solved);
          const sel = $('newPostClaimChallenge');
          if (solved.length) {
            for (const c of solved) {
              const opt = document.createElement('option');
              opt.value = c.slug;
              opt.textContent = `${c.title} · ${c.category} · ${c.difficulty}`;
              sel.appendChild(opt);
            }
          } else {
            const opt = document.createElement('option');
            opt.value = '';
            opt.textContent = "— Solve a challenge first to write it up —";
            opt.disabled = true;
            sel.appendChild(opt);
            sel.disabled = true;
          }
        } catch {}

        // Live markdown preview (sanitized, even though it's the author's own content)
        const body = $('newPostBody'), prev = $('newPostPreview');
        const renderPreview = () => {
          const raw = window.marked ? window.marked.parse(body.value || '', { gfm: true, breaks: true }) : '';
          prev.innerHTML = window.DOMPurify ? window.DOMPurify.sanitize(raw) : '';
        };
        body.addEventListener('input', renderPreview);
        window.setupForumUpload?.(body, { attachBtn: $('newPostAttach') });
        $('newPostForm').addEventListener('submit', async (e) => {
          e.preventDefault();
          const fd = new FormData(e.target);
          try {
            const cr = await window.api.post('/api/forum/posts', {
              category: fd.get('category'),
              title: fd.get('title'),
              body_md: fd.get('body_md'),
              url: fd.get('url') || null,
              go_live: $('newPostGoLive').checked,
              claimed_challenge_slug: $('newPostClaimChallenge').value || null,
            });
            location.href = '/community/post/' + cr.id;
          } catch (err) {
            $('newPostMsg').textContent = err.message;
            $('newPostMsg').style.color = 'var(--hard,#ff6b6b)';
          }
        });
      })();
    })();
  </script>
</body>
</html>
