<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0d12" />
  <title>Create account — aysec</title>
  <link rel="icon" href="/img/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" />
  <link rel="stylesheet" href="/css/styles.css" />
  <script src="/js/theme.js"></script>
</head>
<body>
  <div id="navbar-mount"></div>

  <main class="auth-wrap">
    <div class="auth-card" data-reveal>
      <div class="auth-head">
        <h1>Create your account</h1>
        <p>Free. Takes 30 seconds. No marketing emails.</p>
      </div>

      <form class="form" id="signupForm" novalidate>
        <div id="signupAlert" hidden></div>

        <div class="field">
          <label class="field-label" for="username">Username</label>
          <input class="input mono" type="text" id="username" name="username" autocomplete="username" required minlength="3" maxlength="32" pattern="[a-zA-Z0-9_-]+" />
          <span class="field-hint">Letters, numbers, dashes, underscores. 3–32 chars.</span>
        </div>

        <div class="field">
          <label class="field-label" for="email">Email</label>
          <input class="input" type="email" id="email" name="email" autocomplete="email" required />
        </div>

        <div class="field">
          <label class="field-label" for="password">Password</label>
          <input class="input" type="password" id="password" name="password" autocomplete="new-password" required minlength="8" />
          <span class="field-hint">8+ characters. Use a passphrase.</span>
        </div>

        <button class="btn btn-primary btn-block" type="submit" id="signupBtn">Create account</button>
      </form>

      <div class="auth-foot">
        Already have an account? <a href="/login">Sign in</a>
      </div>
    </div>
  </main>

  <div id="footer-mount"></div>

  <script src="/js/api.js"></script>
  <script src="/js/layout.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
