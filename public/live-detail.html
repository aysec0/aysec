<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0d12" />
  <title>Event — aysec</title>
  <link rel="icon" href="/img/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="/css/styles.css" />
  <script src="/js/theme.js"></script>
</head>
<body>
  <div id="navbar-mount"></div>

  <header class="page-header">
    <div class="container">
      <div class="crumbs"><a href="/">~</a><span class="sep">/</span><a href="/live">live</a><span class="sep">/</span><span id="evSlug">…</span></div>
      <span class="page-eyebrow" id="evEyebrow">// /live</span>
      <h1 class="page-title" id="evTitle">Loading…</h1>
      <p class="page-subtitle" id="evDesc"></p>
      <div class="mono" id="evWindow" style="font-size:0.85rem; color: var(--text-dim); margin-top:0.5rem;"></div>
    </div>
  </header>

  <section class="section">
    <div class="container" style="display:grid; gap:1.5rem; grid-template-columns: minmax(0, 1fr) minmax(0, 360px);">
      <div>
        <div id="evActions" style="margin-bottom:1rem;"></div>
        <div class="section-head" style="margin-bottom:1rem;">
          <h2 class="section-title" style="font-size:1.3rem;">Challenges</h2>
        </div>
        <div id="evChallenges" class="grid grid-cols-1" style="gap:0.7rem;"></div>
      </div>
      <aside style="display:flex; flex-direction:column; gap:1rem;">
        <div class="card" style="padding:1.1rem 1.2rem;">
          <div class="tool-out-label">Status</div>
          <div id="evStatus" style="font-size:1.1rem; font-weight:600; margin-top:0.2rem;">—</div>
          <div class="dim" id="evCountdown" style="font-size:0.85rem; margin-top:0.3rem;"></div>
        </div>
        <div class="card" style="padding:1.1rem 1.2rem;">
          <div class="tool-out-label">Live scoreboard</div>
          <ol id="evBoard" style="margin-top:0.5rem; padding-left:1.1rem; font-size:0.9rem;"><li class="dim">no solves yet</li></ol>
        </div>
      </aside>
    </div>
  </section>

  <div id="footer-mount"></div>

  <script src="/js/api.js"></script>
  <script src="/js/layout.js"></script>
  <script src="/js/live-detail.js"></script>
</body>
</html>
