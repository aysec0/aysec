<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0d12" />
  <title>Course — aysec</title>
  <link rel="icon" href="/img/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" />
  <link rel="stylesheet" href="/css/styles.css" />
  <script src="/js/theme.js"></script>
</head>
<body>
  <div id="navbar-mount"></div>

  <header class="page-header">
    <div class="container">
      <div class="crumbs">
        <a href="/">~</a><span class="sep">/</span>
        <a href="/courses">courses</a><span class="sep">/</span>
        <span id="crumbSlug">…</span>
      </div>
      <div id="detailHead">
        <div class="skeleton" style="height:34px;width:60%"></div>
        <div style="height:8px"></div>
        <div class="skeleton" style="height:18px;width:80%"></div>
      </div>
    </div>
  </header>

  <section class="section">
    <div class="container">
      <div id="socialProofSection"></div>
    </div>
  </section>

  <section class="section" style="background: var(--bg-elev);">
    <div class="container">
      <div class="course-shell" id="courseShell">
        <aside class="lesson-list">
          <div class="lesson-list-head">
            <div class="lesson-list-title">Lessons</div>
            <div class="lesson-list-progress" id="progressLine">— / —</div>
          </div>
          <ol id="lessonList"></ol>
        </aside>

        <div class="lesson-content" id="lessonContent">
          <div class="empty">
            <h3>Select a lesson</h3>
            <p>Pick one from the list to start.</p>
          </div>
        </div>
      </div>
    </div>
  </section>

  <div id="footer-mount"></div>

  <script src="/js/api.js"></script>
  <script src="/js/layout.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
  <script src="/js/course-detail.js"></script>
</body>
</html>
