<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0d12" />
  <title>Tool — aysec</title>
  <meta name="description" content="A single client-side security utility from the aysec toolbox." />
  <link rel="icon" href="/img/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

<body>
  <div id="navbar-mount"></div>

  <header class="page-header" id="toolHeader">
    <div class="container">
      <div class="crumbs"><a href="/">~</a><span class="sep">/</span><a href="/tools">tools</a><span class="sep">/</span><span id="crumbSlug">…</span></div>

      <p class="page-subtitle" id="toolDesc"></p>
    </div>

  <section class="section">
    <div class="container" style="max-width:780px;">
      <div id="toolMount"></div>
      <div class="alert info" style="margin-top:2rem;" id="toolFooter" hidden>
        <svg class="alert-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
        <div>Runs <strong>entirely in your browser</strong>. No input is sent to any server. <a href="/tools">← back to all tools</a></div>
      </div>
    </div>
  </section>

  <div id="footer-mount"></div>

  <script src="/js/api.js"></script>
  <script src="/js/layout.js"></script>
  <script src="/js/tools-manifest.js"></script>
  <script src="/js/tool-detail.js"></script>
