<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0d12" />
  <title>Offline — aysec</title>
  <link rel="icon" href="/img/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/css/styles.css" />
  <style>
    .offline-shell {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem 1rem;
    }
    .offline-card {
      max-width: 560px;
      text-align: center;
    }
    .offline-eyebrow {
      font-family: var(--font-mono);
      font-size: 0.78rem;
      color: var(--text-dim);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .offline-title { font-size: 2rem; font-weight: 800; margin: 0.4rem 0 0.6rem; letter-spacing: -0.02em; }
    .offline-sub { color: var(--text-muted); line-height: 1.55; margin-bottom: 1.5rem; }
    .offline-svg { width: 80px; height: 80px; margin: 0 auto 1rem; }
  </style>
</head>
<body>
  <main class="offline-shell">
    <div class="offline-card">
      <svg class="offline-svg" viewBox="0 0 32 32" aria-hidden="true">
        <path d="M16 2c-6 0-10 4-10 10v3c-2 1-3 3-3 5v8c0 1 1 2 2 2h22c1 0 2-1 2-2v-8c0-2-1-4-3-5v-3c0-6-4-10-10-10z" fill="#1a2030" stroke="#39ff7a" stroke-width="1"/>
        <path d="M9 16c0-3.5 3-6 7-6s7 2.5 7 6c0 2.5-1.5 4-3.5 5l-2 1.5h-3l-2-1.5C10.5 20 9 18.5 9 16z" fill="#0a0d12"/>
        <circle cx="13.5" cy="16.5" r="1" fill="#39ff7a" opacity="0.5"/>
        <circle cx="18.5" cy="16.5" r="1" fill="#39ff7a" opacity="0.5"/>
      </svg>
      <span class="offline-eyebrow">// no signal</span>
      <h1 class="offline-title">offline.</h1>
      <p class="offline-sub">
        ay. you're not connected. the cached pages still work — try
        <a href="/">/</a>, <a href="/challenges">/challenges</a>, or
        <a href="/courses">/courses</a>. anything not yet loaded will
        come back when you do.
      </p>
      <button class="btn btn-primary" onclick="location.reload()">Retry</button>
    </div>
  </main>
</body>
</html>
