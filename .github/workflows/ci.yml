name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  syntax:
    name: Syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Syntax check all JS files
        run: |
          set -e
          find . -type f -name "*.js" \
            -not -path "./node_modules/*" \
            -not -path "./.git/*" \
            -print0 \
          | xargs -0 -n1 node --check
